<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>校园数字孪生系统</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #0a0a1a; font-family: 'Segoe UI', 'PingFang SC', Roboto, sans-serif; }
    canvas { display: block; }

    #info-panel {
      position: fixed; right: 20px; top: 20px; width: 300px;
      background: rgba(10, 10, 30, 0.85); backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.1); border-radius: 12px;
      padding: 20px; color: #e0e0e0; transform: translateX(340px);
      transition: transform 0.4s cubic-bezier(0.16,1,0.3,1);
      z-index: 10;
    }
    #info-panel.visible { transform: translateX(0); }
    #info-panel h2 { font-size: 20px; margin-bottom: 8px; color: #fff; }
    #info-panel .tag {
      display: inline-block; background: rgba(64, 150, 255, 0.25);
      color: #64b5f6; font-size: 12px; padding: 2px 10px;
      border-radius: 20px; margin-bottom: 12px;
    }
    #info-panel p { font-size: 14px; line-height: 1.7; color: #aaa; }
    #info-panel .close-btn {
      position: absolute; top: 12px; right: 16px;
      background: none; border: none; color: #666;
      font-size: 20px; cursor: pointer;
    }
    #info-panel .close-btn:hover { color: #fff; }

    #toolbar {
      position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
      display: flex; gap: 8px; z-index: 10;
    }
    #toolbar button {
      background: rgba(10, 10, 30, 0.75); backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.1); border-radius: 8px;
      color: #ccc; padding: 10px 18px; font-size: 13px;
      cursor: pointer; transition: all 0.2s;
    }
    #toolbar button:hover { background: rgba(64, 150, 255, 0.2); color: #fff; }

    #loading {
      position: fixed; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center; background: #0a0a1a;
      z-index: 100; transition: opacity 0.6s;
    }
    #loading.hidden { opacity: 0; pointer-events: none; }
    #loading .spinner {
      width: 48px; height: 48px; border: 3px solid rgba(255,255,255,0.1);
      border-top-color: #4096ff; border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    #loading p { margin-top: 16px; color: #888; font-size: 14px; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="loading">
    <div class="spinner"></div>
    <p>加载校园场景中...</p>
  </div>

  <div id="info-panel">
    <button class="close-btn" id="panel-close">&times;</button>
    <h2 id="panel-title">建筑名称</h2>
    <span class="tag" id="panel-tag">教学楼</span>
    <p id="panel-desc">建筑描述信息</p>
  </div>

  <div id="toolbar">
    <button id="btn-reset">复位视角</button>
    <button id="btn-top">鸟瞰</button>
    <button id="btn-walk">漫游</button>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>
  <script type="module" src="./src/main.js"></script>
</body>
</html>
